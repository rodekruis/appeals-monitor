name: Deploy KoboToolbox Form

on:
  push:
    paths:
      - "kobo/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-form:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy XLSForm to KoboToolbox
        env:
          KOBO_API_URL: ${{ secrets.KOBO_API_URL }}
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_FORM_UID: ${{ secrets.KOBO_FORM_UID }}
        run: |
          FORM_FILE="kobo/appeals_monitor_subscription.xlsx"

          if [ -z "$KOBO_FORM_UID" ]; then
            echo "No existing form UID — creating new form..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${KOBO_API_URL}/api/v2/assets/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -F "file=@${FORM_FILE}" \
              -F "asset_type=survey")
          else
            echo "Updating existing form ${KOBO_FORM_UID}..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PATCH "${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -F "file=@${FORM_FILE}")
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "✅ Form deployed successfully (HTTP $HTTP_CODE)"
            ASSET_UID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uid',''))" 2>/dev/null)
            if [ -n "$ASSET_UID" ]; then
              echo "Asset UID: $ASSET_UID"
            fi
          else
            echo "❌ Deployment failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Redeploy form (publish)
        if: success()
        env:
          KOBO_API_URL: ${{ secrets.KOBO_API_URL }}
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_FORM_UID: ${{ secrets.KOBO_FORM_UID }}
        run: |
          if [ -n "$KOBO_FORM_UID" ]; then
            echo "Publishing form ${KOBO_FORM_UID}..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/deployment/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"active": true}')

            if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
              echo "✅ Form published successfully"
            elif [[ "$HTTP_CODE" -eq 405 ]]; then
              # Already deployed, use PATCH to redeploy
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PATCH "${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/deployment/" \
                -H "Authorization: Token ${KOBO_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"active": true}')
              if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
                echo "✅ Form redeployed successfully"
              else
                echo "⚠️ Redeploy returned HTTP $HTTP_CODE (form may need manual publish)"
              fi
            else
              echo "⚠️ Publish returned HTTP $HTTP_CODE (form may need manual publish)"
            fi
          fi
