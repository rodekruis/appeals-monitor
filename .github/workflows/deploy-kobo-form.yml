name: Deploy Kobo Form

on:
  push:
    paths:
      - "kobo/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-form:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy XLSForm to KoboToolbox
        env:
          KOBO_API_URL: ${{ secrets.KOBO_API_URL }}
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_FORM_UID: ${{ secrets.KOBO_FORM_UID }}
        run: |
          FORM_FILE="kobo/appeals_monitor_subscription.xlsx"

          if [ -z "$KOBO_FORM_UID" ]; then
            echo "No existing form UID — creating new form via import..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${KOBO_API_URL}/api/v2/imports/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -F "file=@${FORM_FILE}" \
              -F "name=Appeals Monitor Subscription" \
              -F "assetType=survey")
          else
            echo "Replacing form content for ${KOBO_FORM_UID} via import..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${KOBO_API_URL}/api/v2/imports/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -F "file=@${FORM_FILE}" \
              -F "destination=${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/" \
              -F "assetType=survey")
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "✅ Import submitted successfully (HTTP $HTTP_CODE)"
            echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Import UID: {d.get(\"uid\",\"\")}  Status: {d.get(\"status\",\"\")}')" 2>/dev/null || true
            # Wait for import to complete
            IMPORT_UID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uid',''))" 2>/dev/null)
            if [ -n "$IMPORT_UID" ]; then
              echo "Waiting for import to process..."
              sleep 5
              STATUS=$(curl -s \
                "${KOBO_API_URL}/api/v2/imports/${IMPORT_UID}/" \
                -H "Authorization: Token ${KOBO_API_TOKEN}" | \
                python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
              echo "Import status: $STATUS"
              if [ "$STATUS" = "error" ]; then
                echo "❌ Import failed"
                exit 1
              fi
            fi
          else
            echo "❌ Import failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Redeploy form (publish)
        if: success()
        env:
          KOBO_API_URL: ${{ secrets.KOBO_API_URL }}
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_FORM_UID: ${{ secrets.KOBO_FORM_UID }}
        run: |
          if [ -n "$KOBO_FORM_UID" ]; then
            # Get the latest version_id of the asset
            VERSION_ID=$(curl -s \
              "${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('version_id',''))" 2>/dev/null)
            echo "Latest version_id: $VERSION_ID"

            echo "Redeploying form ${KOBO_FORM_UID}..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PATCH "${KOBO_API_URL}/api/v2/assets/${KOBO_FORM_UID}/deployment/" \
              -H "Authorization: Token ${KOBO_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"active\": true, \"version_id\": \"${VERSION_ID}\"}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
              echo "✅ Form redeployed successfully"
            else
              echo "❌ Redeploy failed (HTTP $HTTP_CODE)"
              echo "$BODY"
              exit 1
            fi
          fi
