name: Deploy Logic App

on:
  push:
    paths:
      - "infra/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Logic App ARM template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/logic-app.json
          parameters: >-
            acrName=${{ secrets.ACR_NAME }}
            acrPassword=${{ secrets.ACR_PASSWORD }}
            resourceGroupName=${{ secrets.AZURE_RESOURCE_GROUP }}
            openaiApiKey=${{ secrets.OPENAI_API_KEY }}
            openaiEndpoint=${{ secrets.OPENAI_ENDPOINT }}
            goAuthToken=${{ secrets.GO_AUTH_TOKEN }}
            sendgridApiKey=${{ secrets.SENDGRID_API_KEY }}
            emailFrom=${{ secrets.EMAIL_FROM }}
            koboApiToken=${{ secrets.KOBO_API_TOKEN }}
            koboFormUid=${{ secrets.KOBO_FORM_UID }}
            teamsWebhookUrl=${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Assign Contributor role to Logic App identity
        run: |
          PRINCIPAL_ID=$(az logic workflow show \
            --name appeals-monitor-weekly \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "identity.principalId" -o tsv)

          # Assign Contributor on the resource group so the Logic App can manage ACI
          az role assignment create \
            --assignee "$PRINCIPAL_ID" \
            --role "Contributor" \
            --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}" \
            2>/dev/null || echo "Role assignment already exists"
