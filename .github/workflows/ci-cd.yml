name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Check lock file is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/appeals-monitor:latest \
                       -t ${{ secrets.ACR_NAME }}.azurecr.io/appeals-monitor:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/appeals-monitor:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/appeals-monitor:${{ github.sha }}
